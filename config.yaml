separator: "_"
empty_placeholder: "x"
max_filename_length: 200

fields:
  - name: ad_format
    display_name: "Ad Format"
    position: 1
    category: standard
    detection: auto
    allowed_values: [image, video, carousel, feed, post]

  - name: topic
    display_name: "Topic"
    position: 2
    category: standard
    detection: ai_suggested
    allowed_values: [deals, ugc, ai, motion, meme, generic, app, abstract, quizz, awareness]
    allow_custom: true


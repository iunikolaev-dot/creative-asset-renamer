separator: "_"
empty_placeholder: "x"
max_filename_length: 200
library_dir: "library/"

fields:
  - name: ad_format
    display_name: "Ad Format"
    position: 1
    detection: auto

  - name: topic
    display_name: "Topic"
    position: 2
    detection: ai_suggested
    library_file: "topic.csv"
    allow_custom: true

  - name: who_made_it
    display_name: "Who Made It"
    position: 3
    detection: manual
    library_file: "who_made_it.csv"
    allow_custom: true
    persist_in_session: true

  - name: main_object
    display_name: "Main Object"
    position: 4
    detection: ai_suggested
    library_file: "main_object.csv"
    allow_custom: true

  - name: main_usp
    display_name: "Main USP"
    position: 5
    detection: ai_suggested
    library_file: "main_usp.csv"
    allow_custom: true

  - name: object_option_1
    display_name: "Object Option 1"
    position: 6
    detection: ai_suggested
    library_file: "object_option_1.csv"
    allow_custom: true

  - name: object_option_2
    display_name: "Object Option 2"
    position: 7
    detection: ai_suggested
    library_file: "object_option_2.csv"
    allow_custom: true

  - name: language
    display_name: "Language"
    position: 8
    detection: ai_detected
    library_file: "language.csv"

  - name: details
    display_name: "Details"
    position: 9
    detection: ai_suggested
    library_file: "details.csv"
    allow_custom: true

  - name: sound_type
    display_name: "Sound Type"
    position: 10
    detection: ai_detected
    library_file: "sound_type.csv"

  - name: background
    display_name: "Background"
    position: 11
    detection: ai_detected
    library_file: "background.csv"

  - name: main_color
    display_name: "Main Color"
    position: 12
    detection: auto_ai
    library_file: "main_color.csv"
    allow_custom: true

  - name: hook
    display_name: "Hook"
    position: 13
    detection: ai_suggested
    library_file: "hook.csv"
    allow_custom: true

color_map:
  "#4B0082": purple
  "#800080": purple
  "#008000": green
  "#00FF00": green
  "#FFFFFF": white
  "#000000": black
  "#0000FF": blue
  "#1A56DB": blue
  "#FF0000": red
  "#FFFF00": yellow
  "#FFA500": orange
  "#FFC0CB": pink
  "#A52A2A": brown
  "#808080": gray

ai:
  primary:
    provider: gemini
    model: gemini-2.5-flash
    video_mode: native
  fallback:
    provider: openai
    model: gpt-4o
    video_mode: frames
    video_frames: 3
  fallback_trigger: 3
  max_tokens: 1000
  image_max_size: 1024

color_map:
  "#4B0082": purple
  "#800080": purple
  "#008000": green
  "#00FF00": green
  "#FFFFFF": white
  "#000000": black
  "#0000FF": blue
  "#1A56DB": blue
  "#FF0000": red
  "#FFFF00": yellow
  "#FFA500": orange
  "#FFC0CB": pink
  "#A52A2A": brown
  "#808080": gray

ai:
  primary:
    provider: gemini
    model: gemini-2.0-flash
    video_mode: native
  fallback:
    provider: openai
    model: gpt-5.4
    video_mode: frames
    video_frames: 3
  fallback_trigger: 3
  max_tokens: 1000
  image_max_size: 1024
